name: Main Shelter Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_push_to_docker_hub:
    name: Build & Push backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & collectstatic
        run: |
          docker build . -t gasuaska/snz_shelter:latest
          docker run --rm \
            -v $(pwd)/static_collected:/app/static_collected \
            gasuaska/snz_shelter:latest \
            python manage.py collectstatic --noinput

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: gasuaska/snz_shelter:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - uses: actions/checkout@v3

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.yml,nginx.conf,.env"
          target: "snz_shelter"

      - name: SSH deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd snz_shelter
            sudo mkdir -p /static /app/media

            # Docker Hub login
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            sudo docker compose -f docker-compose.yml pull
            sudo docker compose -f docker-compose.yml down
            sudo docker compose -f docker-compose.yml up -d

            sudo docker compose -f docker-compose.yml exec -T site python manage.py migrate

            sudo docker image prune -af