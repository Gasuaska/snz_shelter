name: Deploy Shelter Site

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build_and_push_site:
    name: Build & Push Django site image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: gasuaska/snz_shelter:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build_and_push_site
    steps:
      - uses: actions/checkout@v3

      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.yml"
          target: "snz_shelter"

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd snz_shelter
            sudo mkdir -p /static /app/media
            sudo docker compose pull
            sudo docker compose down
            sudo docker compose up -d
            sudo docker compose exec site python manage.py migrate
            sudo docker compose exec site python manage.py collectstatic --noinput
            sudo docker compose exec site cp -r /app/staticfiles/. /static/
            sudo docker image prune -af