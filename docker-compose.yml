volumes:
  pg_data:
  static_volume:
  media_volume:
  certs_volume:

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  site:
    image: gasuaska/snz_shelter:latest
    env_file: .env
    volumes:
      - static_volume:/static
      - media_volume:/app/media
    command: gunicorn shelter_project.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db

  nginx:
    image: nginx:1.22
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/static
      - media_volume:/app/media
      - ./certs_volume:/etc/letsencrypt
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot
    depends_on:
      - site
  certbot:
    image: certbot/certbot
    volumes:
      - certs_volume:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

  backup:
    image: alpine:3.18
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - media_volume:/app/media
    entrypoint: >
      sh -c "apk add --no-cache postgresql-client tar bash;
            while true; do
              pg_dump -h db -U django_user django > /backups/backup_$(date +%Y-%m-%d_%H-%M-%S).sql;
              tar -czf /backups/media_$(date +%Y-%m-%d_%H-%M-%S).tar.gz -C /app/media .;
              find /backups -type f -mtime +7 -delete;
              sleep 86400;
            done"
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}