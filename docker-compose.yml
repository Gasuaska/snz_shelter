version: "3.9"

volumes:
  pg_data:
  static_volume:
  media_volume:
  certs_volume:

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  site:
    image: gasuaska/snz_shelter:latest
    env_file: .env
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    command: gunicorn snz_shelter.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db

  nginx:
    image: nginx:1.22
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/static
      - media_volume:/app/media
      - certs_volume:/etc/letsencrypt
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - site
  certbot:
    image: certbot/certbot
    volumes:
      - certs_volume:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"