volumes:
  pg_data_production:
  static_volume:
  media_volume:

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  site:
    image: gasuaska/snz_shelter
    env_file: .env
    depends_on:
    - db
    volumes:
      - static_volume:/static
      - media_volume:/app/media 
  gateway:
    image: gasuaska/shelter_gateway
    env_file: .env
    volumes:
      - static_volume:/static
      - media_volume:/app/media
    ports:
      - 8000:80