server {
  listen 80;
  client_max_body_size 20M;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_set_header Authorization $http_authorization;
    proxy_pass http://site:8000/api/;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://site:8000/admin/;
  }

  location / {
    root /staticfiles/;
    index index.html;
    try_files $uri /index.html;
  }

  location /media/ {
    alias /app/media/;
  }
